name: Soundwich
options:
  bundleIdPrefix: com.zzanggi
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Soundwich:
    type: application
    platform: macOS
    sources:
      - path: Soundwich
    info:
      path: Soundwich/Info.plist
      properties:
        CFBundleName: Soundwich
        CFBundleDisplayName: Soundwich
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.2"
        LSUIElement: true
        NSAudioCaptureUsageDescription: "Soundwich가 앱별 오디오를 캡처해 원하는 출력 장치로 보내려면 권한이 필요해요."
        NSMicrophoneUsageDescription: "앱별 오디오 라우팅을 위해 시스템 오디오 접근 권한이 필요합니다."
    entitlements:
      path: Soundwich/Soundwich.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zzanggi.soundwich
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Soundwich/Info.plist
        CODE_SIGN_ENTITLEMENTS: Soundwich/Soundwich.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
